<app-header title="QR Scanner"></app-header>

<ion-content [fullscreen]="true">

    <swiper-container allow-slide-prev="false" allow-slide-next="false">

        <swiper-slide>
            <ion-button (click)="scan()" expand="full" fill="outline" shape="round" size="large">
                Scan QR/Bar Code
            </ion-button>
        </swiper-slide>

    </swiper-container>
</ion-content>
